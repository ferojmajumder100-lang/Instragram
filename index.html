<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Quick Tools</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { margin-bottom: 25px; font-size: 24px; }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            background-color: #ffffff;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background-color: #f8f8f8;
        }

        .btn:active { transform: scale(0.98); }

        .btn-2fa { border-bottom: 4px solid #4CAF50; }
        .btn-clear { border-bottom: 4px solid #f44336; } /* Red color for clear */
        .btn-email { border-bottom: 4px solid #2196F3; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Insta Manager</h2>

        <button class="btn btn-2fa" onclick="openLink('https://accountscenter.instagram.com/password_and_security/two_factor/')">
            2FA
        </button>

        <button class="btn btn-clear" onclick="clearAndSignup()">
            DATA CLEAR
        </button>

        <button class="btn btn-email" onclick="openLink('https://accountscenter.instagram.com/youraccount/contact_points/?entrypoint=profile_page&is_from_dialog=true')">
            EMAIL CHANGE
        </button>
    </div>

    <script>
        function openLink(url) {
            window.open(url, '_blank');
        }

        function clearAndSignup() {
            // এটি ইনস্টাগ্রামকে ফোর্স করবে লগআউট করতে এবং তারপর সাইন-আপ পেজে নিয়ে যাবে
            const logoutUrl = "https://www.instagram.com/accounts/logout/?next=/accounts/emailsignup/";
            window.open(logoutUrl, '_blank');
        }
    </script>

</body>
</html>
